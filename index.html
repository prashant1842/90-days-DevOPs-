<!DOCTYPE html>
<html>
<head>
    <title>DevOps Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        h2 {
            color: #3498db;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        .btn {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }

        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello Friends 👋</h1>
        <h2>Welcome to DevOps</h2>

        <p>This is my first DevOps project hosted on Linux.</p>
        <p>Learning Git, GitHub, Linux, AWS and CI/CD.</p>

        <a href="#" class="btn">Learn More</a>
    </div>

</body>
</html>
